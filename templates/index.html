<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: {{PRIMARY_COLOR}};
            --secondary-color: #1a1a1a;
            --accent-color: #2563eb;
            --text-color: #1f2937;
            --text-light: #6b7280;
            --bg-color: #ffffff;
            --bg-slide: #ffffff;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            height: 50px;
            background: var(--secondary-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
        }

        .toolbar .title {
            font-size: 16px;
            font-weight: 600;
        }

        .toolbar .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar button {
            padding: 6px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toolbar button:hover {
            background: rgba(255,255,255,0.1);
        }

        .toolbar .counter {
            font-size: 14px;
            margin-right: 10px;
        }

        .slide-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .slide-wrapper {
            width: calc(100vh * 16 / 9);
            height: 100vh;
            max-width: 100%;
            max-height: calc(100vw * 9 / 16);
            background: var(--bg-slide);
            box-shadow: var(--shadow);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        iframe#slide-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Progress bar */
        .progress {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        /* Keyboard hints */
        .hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: var(--text-light);
            opacity: 0.7;
        }

        /* Fullscreen */
        :fullscreen .slide-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
        }

        :fullscreen .toolbar {
            display: none;
        }

        :fullscreen .slide-container {
            padding: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .slide-content {
                padding: 20px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <div class="title">{{TITLE}}</div>
            <div class="controls">
                <span class="counter"><span id="current-slide">1</span> / <span id="total-slides">{{TOTAL_SLIDES}}</span></span>
                <button id="prev-btn">← 上一页</button>
                <button id="next-btn">下一页 →</button>
                <button id="fullscreen-btn">⛶ 全屏</button>
            </div>
        </div>
        <div class="slide-container">
            <div class="slide-wrapper">
                <iframe id="slide-frame" src=""></iframe>
                <div class="progress" id="progress"></div>
                <div class="hint">← → 或 空格/回车翻页 | F 全屏 | Esc 退出全屏</div>
            </div>
        </div>
    </div>

    <script>
        const slides = [
{{SLIDE_LIST}}
        ];

        let currentIndex = 0;
        const totalSlides = slides.length;

        const currentSlideEl = document.getElementById('current-slide');
        const totalSlidesEl = document.getElementById('total-slides');
        const progressEl = document.getElementById('progress');
        const slideFrame = document.getElementById('slide-frame');

        function updateSlide() {
            currentSlideEl.textContent = currentIndex + 1;
            totalSlidesEl.textContent = totalSlides;
            slideFrame.src = slides[currentIndex];
            const progress = ((currentIndex + 1) / totalSlides) * 100;
            progressEl.style.width = progress + '%';
        }

        function nextSlide() {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlide();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.getElementById('next-btn').addEventListener('click', nextSlide);
        document.getElementById('prev-btn').addEventListener('click', prevSlide);
        document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter' || e.key === 'PageDown') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'Backspace' || e.key === 'PageUp') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });

        // Listen for messages from iframe for keyboard events
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'keyboard') {
                if (event.data.key === 'ArrowRight' || event.data.key === ' ' || event.data.key === 'Enter' || event.data.key === 'PageDown') {
                    nextSlide();
                } else if (event.data.key === 'ArrowLeft' || event.data.key === 'Backspace' || event.data.key === 'PageUp') {
                    prevSlide();
                }
            }
        });

        // Initialize
        updateSlide();
    </script>
</body>
</html>
